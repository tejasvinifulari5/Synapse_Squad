<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | SocialLaunch.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/register.css">
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

    <!-- Simple Navigation -->
    <nav class="max-w-5xl mx-auto w-full px-6 py-8 flex items-center justify-start">
        <a href="welcome.html" class="flex items-center gap-3 hover:opacity-80 transition-opacity">
            <div class="w-7 h-7 bg-slate-900 rounded flex items-center justify-center text-white font-bold text-xs">
                SL
            </div>
            <span class="font-bold tracking-tight text-slate-900">SocialLaunch.AI</span>
        </a>
    </nav>

    <!-- Registration Card Container -->
    <main class="flex-grow flex items-center justify-center px-6 pb-24">
        <div class="w-full max-w-md">
            <div class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-100 p-8 md:p-10">
                
                <!-- Header -->
                <div class="mb-8 text-center">
                    <h1 class="text-2xl font-bold text-slate-900 mb-2">Create Account</h1>
                    <p class="text-slate-500 text-sm">Join our AI-powered marketing community</p>
                </div>

                <!-- Form -->
                <form action="#" class="space-y-4" id="registrationForm">
                    <!-- Full Name Field -->
                    <div>
                        <label for="name" class="block text-sm font-semibold text-slate-700 mb-1.5">Full Name</label>
                        <input type="text" id="name" name="name" placeholder="" 
                            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-900"
                            required>
                    </div>

                    <!-- Email Field -->
                    <div>
                        <label for="email" class="block text-sm font-semibold text-slate-700 mb-1.5">Email</label>
                        <input type="email" id="email" name="email" placeholder="" 
                            class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-900"
                            required>
                    </div>

                    <!-- Password Field -->
                    <div class="relative">
                        <label for="password" class="block text-sm font-semibold text-slate-700 mb-1.5">Password</label>
                        <div class="relative">
                            <input type="password" id="password" name="password" placeholder="" 
                                class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-900 pr-12"
                                required>
                            <button type="button" onclick="togglePassword('password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-slate-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 eye-icon">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.301 8.844 7.087 5 12 5c4.913 0 8.699 3.844 9.964 6.678.067.151.067.327 0 .478C20.699 15.156 16.913 19 12 19c-4.913 0-8.699-3.844-9.964-6.678Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Confirm Password Field -->
                    <div class="relative">
                        <label for="confirm-password" class="block text-sm font-semibold text-slate-700 mb-1.5">Confirm Password</label>
                        <div class="relative">
                            <input type="password" id="confirm-password" name="confirm-password" placeholder="" 
                                class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all text-slate-900 pr-12"
                                required>
                            <button type="button" onclick="togglePassword('confirm-password', this)" class="absolute right-3 top-1/2 -translate-y-1/2 p-1.5 text-slate-400 hover:text-slate-600 transition-colors">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5 eye-icon">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.036 12.322a1.012 1.012 0 0 1 0-.644C3.301 8.844 7.087 5 12 5c4.913 0 8.699 3.844 9.964 6.678.067.151.067.327 0 .478C20.699 15.156 16.913 19 12 19c-4.913 0-8.699-3.844-9.964-6.678Z" />
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
                                </svg>
                            </button>
                        </div>
                    </div>

                    <!-- Submit Button -->
                    <button type="submit" class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 mt-4 active:scale-[0.98]">
                        Register
                    </button>
                </form>

                <!-- Divider -->
                <div class="relative my-8">
                    <div class="absolute inset-0 flex items-center">
                        <div class="w-full border-t border-slate-100"></div>
                    </div>
                    <div class="relative flex justify-center text-xs uppercase">
                        <span class="bg-white px-2 text-slate-400 font-medium tracking-wide">Already have an account?</span>
                    </div>
                </div>

                <!-- Login Link -->
                <a href="login.html" class="block w-full text-center py-3.5 border border-slate-200 text-slate-700 font-bold rounded-lg hover:bg-slate-50 transition-all active:scale-[0.98]">
                    Login
                </a>
            </div>
        </div>
    </main>

    <script src="js/register.js"></script>
</body>
</html>
