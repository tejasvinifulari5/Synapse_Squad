<!DOCTYPE html>
<html>
<head>
<title>AI Content Generator</title>
</head>

<body>

<h2>AI Content Generator</h2>

<form method="POST">

<input type="text" name="topic" placeholder="Enter Topic (Example: Dance Competition)" required>
<br><br>

<textarea name="description"
placeholder="Enter brief description (Example: People know more about classical dance)"
rows="4" cols="40" required></textarea>

<br><br>

<button type="submit">Generate</button>

</form>

</body>
</html>
