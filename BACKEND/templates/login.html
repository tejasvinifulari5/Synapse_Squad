<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login | SocialLaunch.AI</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="static/css/login.css">
    <link rel="icon" href="{{ url_for('static', filename='favicon.ico') }}">
  </head>
  <body class="bg-slate-50 min-h-screen flex flex-col">
    <!-- Simple Navigation for Auth Pages -->
    <nav
      class="max-w-5xl mx-auto w-full px-6 py-8 flex items-center justify-start"
    >
      <a
        href="{{ url_for('home') }}"
        class="flex items-center gap-3 hover:opacity-80 transition-opacity"
      >
        <div
          class="w-7 h-7 bg-slate-900 rounded flex items-center justify-center text-white font-bold text-xs"
        >
          SL
        </div>
        <span class="font-bold tracking-tight text-slate-900"
          >SocialLaunch.AI</span
        >
      </a>
    </nav>

    <!-- Login Card Container -->
    <main class="flex-grow flex items-center justify-center px-6 pb-24">
      <div class="w-full max-w-md">
        <div
          class="bg-white rounded-2xl shadow-xl shadow-slate-200/60 border border-slate-100 p-8 md:p-10"
        >
          <!-- Header -->
          <div class="mb-8 text-center">
            <h1 class="text-2xl font-bold text-slate-900 mb-2">Welcome back</h1>
            <p class="text-slate-500 text-sm">
              Log in to manage your AI campaigns
            </p>
          </div>

          <!-- Form -->
          <form action="/login" method="POST" class="space-y-4">
            <!-- Email Field -->
              {% if error %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4">
                   {{ error }}
                </div>
              {% endif %}
            <div>
              <label
                for="email"
                class="block text-sm font-semibold text-slate-700 mb-1.5"
                >Email</label
              >
              <input
                type="email"
                id="email"
                name="email"
                placeholder="Enter your email"
                class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 text-slate-900"
                required
              />
            </div>

            <!-- Password Field -->
            <div>
              <div class="flex justify-between items-center mb-1.5">
                <label
                  for="password"
                  class="block text-sm font-semibold text-slate-700"
                  >Password</label
                >
                <a
                  href="#"
                  class="text-xs font-semibold text-indigo-600 hover:text-indigo-700"
                  >Forgot Password?</a
                >
              </div>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                class="w-full px-4 py-3 rounded-lg border border-slate-200 focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all placeholder:text-slate-400 text-slate-900"
                required
              />
            </div>

            <!-- Submit Button -->
            
              <button
              type="submit"
                class="w-full py-3.5 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 transition-all shadow-lg shadow-indigo-100 mt-2"
              >
                Login
              </button>
            
          </form>

          <!-- Divider -->
          <div class="relative my-8">
            <div class="absolute inset-0 flex items-center">
              <div class="w-full border-t border-slate-100"></div>
            </div>
            <div class="relative flex justify-center text-xs uppercase">
              <span class="bg-white px-2 text-slate-400 font-medium"
                >Don't have an account?</span
              >
            </div>
          </div>

          <!-- Register Button -->
          <a
           href="/register"
            class="block w-full text-center py-3.5 border border-slate-200 text-slate-700 font-bold rounded-lg hover:bg-slate-50 transition-all"
          >
            Register
          </a>
        </div>
      </div>
    </main>
  </body>
</html>
